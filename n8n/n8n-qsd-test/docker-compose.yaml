# Docker Compose for n8n with Gotenberg PDF conversion
# Run with: docker-compose up -d

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme
      - GENERIC_TIMEZONE=UTC
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - gotenberg
    networks:
      - n8n-network

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: gotenberg
    # External port 3001 to avoid conflicts (n8n connects internally on 3000)
    ports:
      - "3001:3000"
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--api-timeout=120s"
    networks:
      - n8n-network

volumes:
  n8n_data:

networks:
  n8n-network:
    driver: bridge
